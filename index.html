<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Squad DJs | Master Planner</title>
    <style>
        :root { --dark: #2c3e50; --light: #f0f2f5; --conflict: #e74c3c; --accent: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--light); padding: 15px; margin: 0; color: #333; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #dfe4ea; border: 2px solid #dfe4ea; border-radius: 12px; overflow: hidden; }
        .weekday { background: var(--dark); color: white; text-align: center; padding: 12px; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; }
        .day { background: white; min-height: 160px; padding: 10px; display: flex; flex-direction: column; gap: 5px; position: relative; }
        .day.today { background: #fff9db; border: 2px solid #f1c40f; }
        .day.conflict { background: #fff5f5; border: 2px solid var(--conflict); }
        .day.other-month { background: #f8f9fa; color: #ccc; }
        .date-num { font-weight: 900; color: #a4b0be; font-size: 1.1rem; }
        .name-tag { color: white; padding: 5px; border-radius: 6px; font-size: 10px; text-align: center; font-weight: 800; text-transform: uppercase; }
        .show-box { background: #34495e; color: white; font-size: 10px; padding: 6px; border-radius: 6px; border-left: 4px solid #1abc9c; margin-top: 2px; }
        .show-box b { display: block; color: #1abc9c; font-size: 11px; margin-bottom: 3px; }
        .show-box i { display: block; font-style: normal; color: #bdc3c7; margin-top: 2px; }
        .id-badge { color: #f1c40f; font-weight: 900; margin-right: 6px; font-size: 11px; }
        .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.6); }
        .modal-content { background:white; margin:5% auto; padding:25px; width:340px; border-radius:15px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-height: 85vh; overflow-y: auto; }
        .dj-edit-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; background:#f9f9f9; padding:10px; border-radius:8px; }
        button { padding: 10px 18px; cursor: pointer; border: none; border-radius: 8px; background: var(--dark); color: white; font-weight: bold; }
        .manage-btn { background: var(--accent); font-size: 0.7rem; margin-top: 5px; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 3000; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading-overlay">Syncing Fun Squad Data...</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
<form id="cors_bypass_form" method="POST" target="hidden_iframe" style="display:none;"></form>

<div id="djModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0">Manage Crew</h2>
        <div id="djSettingsList"></div>
        <button style="background:var(--accent); width:100%; margin-bottom:20px;" id="saveColorsBtn" onclick="saveAllColors()">SAVE ALL COLORS</button>
        <hr>
        <h3>Add New DJ</h3>
        <input type="text" id="newDjName" placeholder="Name" style="padding:10px; width:85%; border:1px solid #ddd; border-radius:8px; margin-bottom:10px;">
        <input type="color" id="newDjColor" value="#3498db" style="width:100%; height:40px; border:none; background:none; cursor:pointer;"><br><br>
        <button id="addDjBtn" style="background:#27ae60; width:100%;" onclick="addNewDj()">ADD DJ & SYNC FORM</button><br><br>
        <button onclick="closeModal('djModal')" style="background:#95a5a6; width:100%;">Close</button>
    </div>
</div>

<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h2>Update ICS File</h2>
        <input type="file" id="icsInput" accept=".ics" style="margin-bottom:20px;"><br>
        <button id="uploadBtn" style="background:#27ae60; width:100%;" onclick="handleIcsUpload()">UPLOAD TO GITHUB</button><br><br>
        <button onclick="closeModal('uploadModal')" style="background:#95a5a6; width:100%;">Cancel</button>
    </div>
</div>

<div class="header">
    <button onclick="changeMonth(-1)">◀ PREV</button>
    <div style="text-align: center;">
        <h2 id="monthLabel" style="margin: 0;">Month Year</h2>
        <button class="manage-btn" onclick="openModal('djModal')">MANAGE CREW</button>
        <button onclick="goToToday()" style="font-size: 0.6rem; padding: 2px 8px; margin-left: 5px; background: #95a5a6; color:white; border-radius:4px; border:none; cursor:pointer;">TODAY</button>
    </div>
    <button onclick="changeMonth(1)">NEXT ▶</button>
    <div style="position:absolute; right:20px; top:15px;">
        <button style="background:#95a5a6; padding:5px 10px; font-size:12px;" onclick="openModal('uploadModal')">⚙️ ICS</button>
    </div>
</div>

<div id="calendar" class="calendar-grid"></div>

<script>
    // PASTE YOUR NEW DEPLOYMENT URL HERE
    const scriptURL = 'PASTE_YOUR_NEW_DEPLOY_URL_HERE'; 
    const GITHUB_REPO = 'ljensenpdx/DJTimeOffTracker'; 

    let viewDate = new Date();
    let offData = [], showData = [], djSettings = [];

    const clean = (str) => str ? str.replace(/\\,/g, ',').replace(/\\n/g, ' ').trim() : "";
    function formatTime(icalStr) {
        if(!icalStr) return "";
        let hh = parseInt(icalStr.substring(9, 11));
        let mm = icalStr.substring(11, 13);
        let ampm = hh >= 12 ? 'PM' : 'AM';
        hh = hh % 12 || 12;
        return `${hh}:${mm} ${ampm}`;
    }

    async function loadIcalData() {
        try {
            const res = await fetch('events.ics?t=' + new Date().getTime());
            let text = await res.text();
            text = text.replace(/\r?\n[ \t]/g, "");
            const events = [];
            const blocks = text.split("BEGIN:VEVENT");
            blocks.shift(); 
            blocks.forEach(block => {
                const startRaw = block.match(/DTSTART:(\d{8}T\d{6})/)?.[1];
                const summary = clean(block.match(/SUMMARY:(.*)/)?.[1]);
                const desc = clean(block.match(/DESCRIPTION:(.*)/)?.[1]);
                const idMatch = (summary + desc).match(/(?:ID:\s*|#)(\d{4,})|(\d{4,})/);
                if (startRaw) {
                    events.push({
                        id: idMatch ? (idMatch[1] || idMatch[2]) : "??",
                        date: `${startRaw.substring(0, 4)}-${startRaw.substring(4, 6)}-${startRaw.substring(6, 8)}`,
                        client: summary.replace("DJ Event for ", ""),
                        time: `${formatTime(startRaw)} - ${formatTime(block.match(/DTEND:(\d{8}T\d{6})/)?.[1])}`,
                        loc: clean(block.match(/LOCATION:(.*)/)?.[1]).split(',')[0]
                    });
                }
            });
            return events;
        } catch (e) { return []; }
    }

    async function init() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            offData = data.offData || [];
            djSettings = data.djs || [];
        } catch(e) { console.error("Sync error"); }
        showData = await loadIcalData();
        document.getElementById('loading-overlay').style.display = 'none';
        render();
    }

    function render() {
        const grid = document.getElementById('calendar');
        grid.innerHTML = '';
        const month = viewDate.getMonth(), year = viewDate.getFullYear(), now = new Date();
        document.getElementById('monthLabel').innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
        ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => grid.innerHTML += `<div class="weekday">${d}</div>`);
        const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="day other-month"></div>`;

        for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${year}-${(month+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            const isToday = (d === now.getDate() && month === now.getMonth() && year === now.getFullYear());
            const todayOff = offData.filter(row => row[1] === dateStr);
            const todayShows = showData.filter(s => s.date === dateStr);
            let dayHtml = `<div class="day ${todayShows.length > (djSettings.length - todayOff.length) ? 'conflict' : ''} ${isToday ? 'today' : ''}"><span class="date-num">${d}</span>`;
            todayOff.forEach(row => {
                const djName = String(row[0]).trim().toLowerCase();
                const dj = djSettings.find(s => s.name.trim().toLowerCase() === djName);
                dayHtml += `<div class="name-tag" style="background:${dj ? dj.color : '#95a5a6'}">${row[0]}</div>`;
            });
            todayShows.forEach(s => {
                dayHtml += `<div class="show-box"><b><span class="id-badge">#${s.id}</span>🎤 ${s.client}</b>${s.time}<i>@ ${s.loc}</i></div>`;
            });
            grid.innerHTML += dayHtml + `</div>`;
        }
    }

    function submitHiddenForm(data) {
        const form = document.getElementById('cors_bypass_form');
        form.action = scriptURL;
        form.innerHTML = '';
        for (const key in data) {
            const input = document.createElement('input');
            input.type = 'hidden'; input.name = key;
            input.value = typeof data[key] === 'object' ? JSON.stringify(data[key]) : data[key];
            form.appendChild(input);
        }
        form.submit();
    }

    function addNewDj() {
        const name = document.getElementById('newDjName').value;
        if(!name) return alert("Enter name");
        document.getElementById('addDjBtn').innerText = "SYNCING...";
        submitHiddenForm({ action: 'addDJ', name: name, color: document.getElementById('newDjColor').value });
        setTimeout(() => location.reload(), 2500);
    }

    function saveAllColors() {
        document.getElementById('saveColorsBtn').innerText = "SAVING...";
        const updates = Array.from(document.querySelectorAll('.dj-edit-row')).map(row => ({ 
            name: row.dataset.name, 
            color: row.querySelector('input').value 
        }));
        submitHiddenForm({ action: 'saveColors', updates: updates });
        setTimeout(() => {
            document.getElementById('saveColorsBtn').innerText = "SAVED!";
            setTimeout(() => location.reload(), 800);
        }, 2000);
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; if(id === 'djModal') loadDjList(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function loadDjList() {
        document.getElementById('djSettingsList').innerHTML = djSettings.map(dj => `
            <div class="dj-edit-row" data-name="${dj.name}"><strong>${dj.name}</strong><input type="color" value="${dj.color}"></div>
        `).join('');
    }
    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); render(); }
    function goToToday() { viewDate = new Date(); render(); }
    
    async function handleIcsUpload() {
        const fileInput = document.getElementById('icsInput');
        if (!fileInput.files[0]) return alert("Select file");
        let token = localStorage.getItem('gh_token');
        if (!token) { token = prompt("Enter Token:"); if (token) localStorage.setItem('gh_token', token); }
        if (!token) return;
        try {
            const content = await fileInput.files[0].text();
            const base64 = btoa(unescape(encodeURIComponent(content)));
            const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/events.ics`, { headers: { 'Authorization': `token ${token}` } });
            const data = await res.json();
            const put = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/events.ics`, {
                method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Update ICS`, content: base64, sha: data.sha })
            });
            if (put.ok) { alert("Success!"); location.reload(); }
        } catch (e) { alert("Failed."); localStorage.removeItem('gh_token'); }
    }
    init();
</script>
</body>
</html>
